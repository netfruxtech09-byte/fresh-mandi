services:
  postgres:
    image: postgres:16-alpine
    container_name: fresh_mandi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fresh_mandi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fresh_mandi"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
