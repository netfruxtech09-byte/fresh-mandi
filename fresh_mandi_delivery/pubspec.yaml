name: fresh_mandi_delivery
description: Fresh Mandi Delivery Executive App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  dio: ^5.9.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.5
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2
  intl: ^0.20.2
  mobile_scanner: ^7.1.3
  geolocator: ^14.0.2
  google_fonts: ^6.3.1
  flutter_windowmanager_plus: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/splash/splash_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#F4F7F4"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter_native_splash:
  color: "#F4F7F4"
  image: assets/splash/splash_logo.png
  android_12:
    image: assets/splash/splash_logo.png
    color: "#F4F7F4"
  android: true
  ios: true
